<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Tracker</title>
    <!-- Anti-flash: apply saved theme before paint -->
    <script>try{var t=localStorage.getItem('pt_theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}</script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <a class="logo" href="index.html">&#9675; Productivity Tracker</a>
        <div class="header-right">
            <nav>
                <a href="index.html" class="active">Home</a>
                <a href="about.html">About</a>
            </nav>
            <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>Today's Tasks</h1>
            <p id="date-display"></p>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat">
                <div class="value" id="stat-total">0</div>
                <div class="label">Total</div>
            </div>
            <div class="stat">
                <div class="value" id="stat-done">0</div>
                <div class="label">Done</div>
            </div>
            <div class="stat">
                <div class="value" id="stat-left">0</div>
                <div class="label">Left</div>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-wrap">
            <div class="progress-header">
                <span class="progress-title">Daily Progress</span>
                <span class="progress-pct" id="progress-pct">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-sub" id="progress-sub">Add tasks to start tracking</div>
        </div>

        <!-- Add task -->
        <div class="card">
            <h2>Add a task</h2>
            <form class="task-form" id="task-form">
                <div class="form-inputs">
                    <input
                        type="text"
                        id="task-input"
                        placeholder="e.g. Review lecture notes..."
                        autocomplete="off"
                        maxlength="120"
                    />
                    <select id="cat-select">
                        <option value="school">School</option>
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="health">Health</option>
                    </select>
                    <input type="date" id="date-input" title="Due date (optional)" />
                    <button type="submit" class="btn">+ Add</button>
                </div>
                <p class="form-error" id="form-error">Please enter a task name.</p>
            </form>
        </div>

        <!-- Task list -->
        <div class="card">
            <h2>Task list</h2>
            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="school">School</button>
                <button class="filter-btn" data-filter="work">Work</button>
                <button class="filter-btn" data-filter="personal">Personal</button>
                <button class="filter-btn" data-filter="health">Health</button>
            </div>
            <ul class="task-list" id="task-list">
                <li class="empty-state" id="empty-msg">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-text">No tasks yet</div>
                    <div class="empty-state-sub">Add your first task above to get started</div>
                </li>
            </ul>
        </div>
    </main>

    <footer>
        CMPA4403 &mdash; Productivity Tracker
    </footer>

    <script>
        // ── Date display ──
        document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-US', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // ── Dark mode toggle ──
        const themeToggle = document.getElementById('theme-toggle');
        const root = document.documentElement;

        function syncToggleIcon() {
            themeToggle.textContent = root.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
        }
        syncToggleIcon();

        themeToggle.addEventListener('click', () => {
            const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            try { localStorage.setItem('pt_theme', next); } catch(e) {}
            syncToggleIcon();
        });

        // ── State ──
        const STORAGE_KEY = 'pt_tasks';
        let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let activeFilter = 'all';

        function save() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {}
        }

        // ── Due date helpers ──
        function parseLocalDate(str) {
            // Parse YYYY-MM-DD as local date to avoid UTC timezone shifts
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        function getDueStatus(task) {
            if (!task.dueDate || task.done) return null;
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const due   = parseLocalDate(task.dueDate);
            if (due < today) return 'overdue';
            if (due.getTime() === today.getTime()) return 'today';
            return 'upcoming';
        }

        function formatDate(str) {
            return parseLocalDate(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // ── Progress bar ──
        function updateProgress() {
            const total = tasks.length;
            const done  = tasks.filter(t => t.done).length;
            const pct   = total === 0 ? 0 : Math.round((done / total) * 100);

            const fill = document.getElementById('progress-fill');
            const pctEl = document.getElementById('progress-pct');
            const sub   = document.getElementById('progress-sub');

            fill.style.width = pct + '%';
            fill.classList.toggle('complete', pct === 100 && total > 0);
            pctEl.textContent = pct + '%';
            sub.textContent = total === 0
                ? 'Add tasks to start tracking'
                : `${done} of ${total} task${total !== 1 ? 's' : ''} complete`;
        }

        // ── Filter tabs ──
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                activeFilter = btn.dataset.filter;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                render();
            });
        });

        // ── Render ──
        function render() {
            const list     = document.getElementById('task-list');
            const emptyMsg = document.getElementById('empty-msg');

            // Stats
            const total = tasks.length;
            const done  = tasks.filter(t => t.done).length;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-done').textContent  = done;
            document.getElementById('stat-left').textContent  = total - done;
            updateProgress();

            // Clear task items
            Array.from(list.querySelectorAll('.task-item')).forEach(el => el.remove());

            const filtered = activeFilter === 'all'
                ? tasks
                : tasks.filter(t => t.category === activeFilter);

            emptyMsg.style.display = filtered.length === 0 ? 'block' : 'none';
            // Update empty state messaging depending on context
            const emptyText = emptyMsg.querySelector('.empty-state-text');
            const emptySub  = emptyMsg.querySelector('.empty-state-sub');
            if (tasks.length === 0) {
                emptyText.textContent = 'No tasks yet';
                emptySub.textContent  = 'Add your first task above to get started';
            } else {
                emptyText.textContent = `No ${activeFilter} tasks`;
                emptySub.textContent  = 'Try a different filter or add a new task';
            }

            filtered.forEach(task => {
                const realIdx  = tasks.indexOf(task);
                const status   = getDueStatus(task);

                const li = document.createElement('li');
                li.className = 'task-item' + (task.done ? ' done' : '');
                if (task.category) li.dataset.category = task.category;

                // Checkbox
                const cb = document.createElement('input');
                cb.type    = 'checkbox';
                cb.checked = task.done;
                cb.addEventListener('change', () => {
                    tasks[realIdx].done = cb.checked;
                    save(); render();
                });

                // Label
                const label = document.createElement('span');
                label.className   = 'task-label';
                label.textContent = task.text;
                label.addEventListener('click', () => {
                    cb.checked = !cb.checked;
                    tasks[realIdx].done = cb.checked;
                    save(); render();
                });

                // Category badge
                const badge = document.createElement('span');
                badge.className   = `cat-badge cat-${task.category}`;
                badge.textContent = task.category;

                // Due date label
                let dueEl = null;
                if (task.dueDate) {
                    dueEl = document.createElement('span');
                    dueEl.className = 'due-label';
                    if (status === 'overdue')  { dueEl.classList.add('overdue');   dueEl.textContent = '⚠ ' + formatDate(task.dueDate); }
                    else if (status === 'today'){ dueEl.classList.add('due-today'); dueEl.textContent = '📅 Today'; }
                    else                        { dueEl.textContent = '📅 ' + formatDate(task.dueDate); }
                }

                // Delete button
                const del = document.createElement('button');
                del.className = 'delete-btn';
                del.title     = 'Remove';
                del.innerHTML = '&#10005;';
                del.addEventListener('click', () => {
                    tasks.splice(realIdx, 1);
                    save(); render();
                });

                li.appendChild(cb);
                li.appendChild(label);
                if (task.category) li.appendChild(badge);
                if (dueEl)         li.appendChild(dueEl);
                li.appendChild(del);
                list.appendChild(li);
            });
        }

        // ── Add task with validation ──
        const taskInput  = document.getElementById('task-input');
        const formError  = document.getElementById('form-error');

        taskInput.addEventListener('input', () => {
            taskInput.classList.remove('error');
            formError.classList.remove('visible');
        });

        taskInput.addEventListener('animationend', () => {
            taskInput.classList.remove('error');
        });

        document.getElementById('task-form').addEventListener('submit', e => {
            e.preventDefault();
            const text = taskInput.value.trim();

            if (!text) {
                formError.classList.add('visible');
                taskInput.classList.remove('error');
                void taskInput.offsetWidth; // force reflow to restart animation
                taskInput.classList.add('error');
                taskInput.focus();
                return;
            }

            formError.classList.remove('visible');
            tasks.push({
                text,
                done:     false,
                category: document.getElementById('cat-select').value,
                dueDate:  document.getElementById('date-input').value || null
            });
            save();
            render();
            taskInput.value = '';
            document.getElementById('date-input').value = '';
            taskInput.focus();
        });

        render();
    </script>

</body>
</html>
